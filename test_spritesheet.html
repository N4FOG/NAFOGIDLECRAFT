<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Idle Craft - Preview de Spritesheet de Armas</title>
    <style>
        body {
            background-color: #12121e;
            color: #e0e0ea;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 30px;
            text-align: center;
        }

        h1 {
            color: #ffd700;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .weapon-card {
            background-color: #1a1a2e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 
           O container do ícone é um quadrado menor.
           A imagem original é 1402x1122.
           Cada célula inteira tem ~200px de largura e ~224px de altura.
           Se redimensionarmos a imagem de fundo para um tamanho menor, 
           podemos exibir em qualquer resolução.
           
           Vamos fazer o scale para que cada ícone tenha exatamente 64px x 64px.
           Se a largura alvo de cada célula é 64px:
           Fator de escala = 64 / 200 = 0.32
           Largura total da imagem escalada = 1402 * 0.32 = 448.64px
           Altura total da imagem escalada = 1122 * 0.32 = 359.04px
           
           Cada coluna desloca -64px.
           Cada linha desloca -71.68px (224 * 0.32).
           Para esconder o texto, limitamos a altura da div do ícone a 64px e usamos overflow: hidden.
        */
        .weapon-icon {
            width: 58px;
            height: 58px;
            background-image: url('ICONES.png');
            background-repeat: no-repeat;
            border-radius: 6px;
            border: 1px solid #ffd700;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.2);
            /* Ajustando o tamanho de fundo para bater com as posições escaladas */
            background-size: 448px 358px; 
        }

        .weapon-name {
            font-size: 0.75em;
            margin-top: 8px;
            color: #ccc;
            font-weight: bold;
        }

        /* Definição de Posições (Linha, Coluna) 0-indexed */
        /* Linha 0 */
        .wpn-0-0 { background-position: -4px -3px; }
        .wpn-0-1 { background-position: -65px -3px; }
        .wpn-0-2 { background-position: -129px -4px; }
        .wpn-0-3 { background-position: -191px -4px; }
        .wpn-0-4 { background-position: -253px -4px; }
        .wpn-0-5 { background-position: -314px -4px; }
        .wpn-0-6 { background-position: -379px -4px; }

        /* Linha 1 */
        .wpn-1-0 { background-position: -5px -78px; background-size: 448px 377px; }
        .wpn-1-1 { background-position: -67px -78px; background-size: 448px 377px; }
        .wpn-1-2 { background-position: -128px -78px; }
        .wpn-1-3 { background-position: -190px -78px; }
        .wpn-1-4 { background-position: -253px -77px; }
        .wpn-1-5 { background-position: -315px -77px; }
        .wpn-1-6 { background-position: -379px -77px; }

        /* Linha 2 */
        .wpn-2-0 { background-position: -6px -153px; }
        .wpn-2-1 { background-position: -67px -152px; }
        .wpn-2-2 { background-position: -128px -153px; }
        .wpn-2-3 { background-position: -190px -152px; }
        .wpn-2-4 { background-position: -260px -147px; }
        .wpn-2-5 { background-position: -324px -147px; }
        .wpn-2-6 { background-position: -388px -147px; }

        /* Linha 3 */
        .wpn-3-0 { background-position: -4px -219px; }
        .wpn-3-1 { background-position: -68px -219px; }
        .wpn-3-2 { background-position: -132px -219px; }
        .wpn-3-3 { background-position: -196px -219px; }
        .wpn-3-4 { background-position: -260px -219px; }
        .wpn-3-5 { background-position: -324px -219px; }
        .wpn-3-6 { background-position: -388px -219px; }

        /* Linha 4 */
        .wpn-4-0 { background-position: -5px -298px; }
        .wpn-4-1 { background-position: -67px -299px; }
        .wpn-4-2 { background-position: -129px -300px; }
        .wpn-4-3 { background-position: -324px -291px; }
        .wpn-4-4 { background-position: -260px -291px; }
        .wpn-4-5 { background-position: -324px -291px; }
        .wpn-4-6 { background-position: -388px -291px; }
    </style>
</head>
<body>
    <h1>Preview das Armas Cortadas (Spritesheet)</h1>
    <p>Abaixo estão os ícones individuais cortados da sua imagem <code>ICONES.png</code> usando CSS Spritesheet.</p>
    
    <div class="grid" id="previewGrid"></div>

    <script>
        const weapons = [
            // Linha 0
            { name: "Espada Curta", class: "wpn-0-0" },
            { name: "Espada Longa", class: "wpn-0-1" },
            { name: "Espadão", class: "wpn-0-2" },
            { name: "Cimtarra", class: "wpn-0-3" },
            { name: "Adaga", class: "wpn-0-4" },
            { name: "Adagas Duplas", class: "wpn-0-5" },
            { name: "Katana", class: "wpn-0-6" },
            // Linha 1
            { name: "Machado", class: "wpn-1-0" },
            { name: "Machado de Batalha", class: "wpn-1-1" },
            { name: "Machado Pesado", class: "wpn-1-2" },
            { name: "Martelo", class: "wpn-1-3" },
            { name: "Martelo de Guerra", class: "wpn-1-4" },
            { name: "Maça", class: "wpn-1-5" },
            { name: "Estrela da Manhã", class: "wpn-1-6" },
            // Linha 2
            { name: "Lança", class: "wpn-2-0" },
            { name: "Tridente", class: "wpn-2-1" },
            { name: "Alabarda", class: "wpn-2-2" },
            { name: "Besta", class: "wpn-2-3" },
            { name: "Arco Longo", class: "wpn-2-4" },
            { name: "Arco Curto", class: "wpn-2-5" },
            { name: "Arco Composto", class: "wpn-2-6" },
            // Linha 3
            { name: "Cajado", class: "wpn-3-0" },
            { name: "Cajado Mágico", class: "wpn-3-1" },
            { name: "Cajado Natureza", class: "wpn-3-2" },
            { name: "Cajado Sombrio", class: "wpn-3-3" },
            { name: "Cajado Sagrado", class: "wpn-3-4" },
            { name: "Varinha", class: "wpn-3-5" },
            { name: "Varinha Arcana", class: "wpn-3-6" },
            // Linha 4
            { name: "Espada Flamejante", class: "wpn-4-0" },
            { name: "Espada Gelada", class: "wpn-4-1" },
            { name: "Espada Elétrica", class: "wpn-4-2" },
            { name: "Espada Venenosa", class: "wpn-4-3" },
            { name: "Espada Sombria", class: "wpn-4-4" },
            { name: "Espada Lendária", class: "wpn-4-5" },
            { name: "Matadora de Dragões", class: "wpn-4-6" }
        ];

        const grid = document.getElementById('previewGrid');
        weapons.forEach(w => {
            const card = document.createElement('div');
            card.className = 'weapon-card';
            card.innerHTML = `
                <div class="weapon-icon ${w.class}"></div>
                <div class="weapon-name">${w.name}</div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
